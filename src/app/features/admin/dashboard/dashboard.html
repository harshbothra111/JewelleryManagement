<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <!-- Add your CSS links here -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-12 mb-4">
            <h2>Admin Dashboard</h2>
            <p class="text-muted">Welcome to the Jewelry Management Administrator Panel.</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-3">
            <div class="card bg-primary text-white h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Total Sales</h5>
                    <p class="display-6">$45,230</p>
                    <p class="card-text mb-0"><small>This month</small></p>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card bg-success text-white h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Orders (Karigar)</h5>
                    <p class="display-6">12</p>
                    <p class="card-text mb-0"><small>Pending fulfillment</small></p>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card bg-info text-dark h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">Staff active</h5>
                    <p class="display-6">4</p>
                    <p class="card-text mb-0"><small>Billers currently online</small></p>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-5">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    Quick Actions
                </div>
                <div class="list-group list-group-flush">
                    <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" routerLink="/admin/invoice">
                        Create Invoice (Admin)
                        <span class="badge bg-success rounded-pill">+</span>
                    </button>
                    <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" routerLink="/admin/pricing">
                        Manage Daily Pricing
                        <span class="badge bg-warning text-dark rounded-pill">Update</span>
                    </button>
                    <button class="list-group-item list-group-item-action">View Sale History</button>
                    <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" routerLink="/admin/order/new">
                        Place Order to Karigar
                        <span class="badge bg-primary rounded-pill">Place</span>
                    </button>
                    <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" routerLink="/admin/order/summary">
                        Order Summary
                        <span class="badge bg-secondary rounded-pill">View</span>
                    </button>
                    <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center" routerLink="/admin/order/karigar">
                        Order By Karigar
                        <span class="badge bg-info rounded-pill">View</span>
                    </button>
                    <button class="list-group-item list-group-item-action">Manage Staff Accounts</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add your JavaScript links here -->
</body>
</html>
