<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white text-center">
          <h4 class="mb-0">Jewelry Management Login</h4>
        </div>
        <div class="card-body">
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            
            <div *ngIf="errorMsg" class="alert alert-danger">
              {{ errorMsg }}
            </div>

            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input 
                type="text" 
                id="username" 
                class="form-control" 
                formControlName="username" 
                placeholder="Enter admin or biller"
                [ngClass]="{'is-invalid': loginForm.get('username')?.touched && loginForm.get('username')?.invalid}"
              >
              <div class="invalid-feedback">Username is required.</div>
            </div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="loginForm.invalid">
              Sign In
            </button>
            
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
