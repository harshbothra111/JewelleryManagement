<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biller Dashboard</title>
    <!-- Add your CSS links here -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="row">
        <div class="col-12 mb-4">
            <h2>Biller Dashboard</h2>
            <p class="text-muted">Manage daily billing and stock requirements.</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    New Bill
                </div>
                <div class="card-body">
                    <p class="card-text">Start a new billing session for a customer.</p>
                    <button class="btn btn-primary" routerLink="/biller/invoice">Create Invoice</button>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-header bg-warning">
                    Stock Requests
                </div>
                <div class="card-body">
                    <p class="card-text">Request new items from the Admin wholesale orders.</p>
                    <button class="btn btn-outline-dark">Place Order</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add your JavaScript links here -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
