<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4" *ngIf="currentUser">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Jewelry Soft</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item" *ngIf="currentUser.role === 'Admin'">
          <a class="nav-link" routerLink="/admin/dashboard" routerLinkActive="active">Admin Dashboard</a>
        </li>
        <li class="nav-item" *ngIf="currentUser.role === 'Biller'">
          <a class="nav-link" routerLink="/biller/dashboard" routerLinkActive="active">Biller Dashboard</a>
        </li>
      </ul>
      <div class="d-flex text-white align-items-center gap-2">
        <a class="nav-link text-white" [routerLink]="currentUser.role === 'Admin' ? '/admin/profile' : '/biller/profile'" routerLinkActive="active">
          Hello, {{ currentUser.username | titlecase }} ({{ currentUser.role }})
        </a>
        <button class="btn btn-outline-light btn-sm" (click)="logout()">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="container pb-5">
  <router-outlet></router-outlet>
</div>
