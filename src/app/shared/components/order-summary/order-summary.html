<div class="row mb-4 align-items-center">
  <div class="col">
    <h3 class="mb-0 fw-bold">All Orders Summary</h3>
    <p class="text-muted small">View and manage all placed manufacturing orders</p>
  </div>
  <div class="col-auto">
    <button class="btn btn-outline-secondary" [routerLink]="backRoute">Back to Dashboard</button>
  </div>
</div>

<div class="card shadow-sm border-0">
  <div class="card-body p-0">
    <div *ngIf="allOrders.length === 0" class="text-center py-5 bg-light rounded text-muted">
      <h4>No orders found.</h4>
    </div>
    
    <div class="table-responsive" *ngIf="allOrders.length > 0">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="ps-4">ID</th>
            <th>Customer</th>
            <th>Karigar</th>
            <th>Total Amount</th>
            <th>Status</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let order of allOrders" class="border-bottom">
            <td class="ps-4 fw-bold text-secondary">#{{ order.id }}</td>
            <td>
              <h6 class="mb-0 text-dark">{{ order.customerName }}</h6>
              <small class="text-muted">{{ order.customerPhone }}</small>
            </td>
            <td><span class="badge bg-light text-dark border">{{ order.goldsmithName }}</span></td>
            <td class="fw-bold">{{ order.grandTotal | currency:'INR':'symbol' }}</td>
            <td>
              <span class="badge rounded-pill"
                    [ngClass]="{
                      
                      'bg-warning text-dark': order.status === 'Pending',
                      'bg-success': order.status === 'Fulfilled',
                      'bg-danger': order.status === 'Cancelled'
                    }">{{ order.status }}</span>
            </td>
            <td class="text-center">
              <div class="d-flex gap-2 justify-content-center">
                <!-- Dropdown or inline buttons -->
                
                <button class="btn btn-sm btn-success" *ngIf="order.status === 'Pending'" (click)="changeOrderStatus(order.id, 'Fulfilled')">Fulfill</button>
                <button class="btn btn-sm btn-outline-danger" *ngIf="order.status !== 'Cancelled' && order.status !== 'Fulfilled'" (click)="changeOrderStatus(order.id, 'Cancelled')">Cancel</button>
                <button class="btn btn-sm btn-primary" *ngIf="order.status === 'Pending'" (click)="generateOrderPrint(order)">Print Order</button>
                <button class="btn btn-sm btn-primary" *ngIf="order.status === 'Fulfilled'" (click)="generateTaxInvoice(order)">Print Invoice</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
